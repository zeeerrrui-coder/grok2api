services:
  grok2api:
    container_name: grok2api
    build: .
    ports:
      - "${HOST_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      ACCOUNT_STORAGE: postgresql
      ACCOUNT_POSTGRESQL_URL: postgresql+asyncpg://grok2api:grok2api_pass@postgres:5432/grok2api
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    container_name: grok2api-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grok2api
      POSTGRES_PASSWORD: grok2api_pass
      POSTGRES_DB: grok2api
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grok2api"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "127.0.0.1:8191:8191"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: info
    restart: unless-stopped

volumes:
  pgdata:
