services:
  - type: web
    name: grok2api
    env: docker
    plan: free
    autoDeploy: false
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TZ
        value: Asia/Shanghai
      - key: LOG_LEVEL
        value: INFO
      - key: ACCOUNT_STORAGE
        value: local
      - key: ACCOUNT_LOCAL_PATH
        value: data/accounts.db
      - key: SERVER_HOST
        value: 0.0.0.0
      - key: SERVER_PORT
        value: "8000"
