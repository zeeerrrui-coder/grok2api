name: Feature
description: 新功能或现有功能增强建议
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 背景 / 痛点
      placeholder: 当前有什么不足？这个需求的使用场景是什么？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望行为
      placeholder: 希望如何工作？有没有参考实现？
    validations:
      required: true
