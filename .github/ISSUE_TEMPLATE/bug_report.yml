name: Bug
description: 反馈缺陷或异常行为
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      placeholder: 发生了什么，和预期行为有何不同？
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动服务，配置为 xxx
        2. 调用 xxx 接口
        3. 报错 / 出现异常行为
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本
      placeholder: v1.x.x 或 commit hash
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      render: shell
    validations:
      required: true
